apiVersion: v1
kind: ConfigMap
metadata:
  name: tracing-agent-gateway-config
  namespace: default
data:
  config.yaml: |-
    config:
      tracing:
        otlpEndpoint: http://jaeger-collector.observability.svc.cluster.local:4317
        otlpProtocol: grpc
        randomSampling: true
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayParameters
metadata:
  name: tracing-configmap-gateway-params
  namespace: default
spec:
  kube:
    agentgateway:
      enabled: true
      logLevel: debug
      customConfigMapName: tracing-agent-gateway-config
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: agentgateway-tracing-configmap
spec:
  controllerName: kgateway.dev/agentgateway
  parametersRef:
    group: gateway.kgateway.dev
    kind: GatewayParameters
    name: tracing-configmap-gateway-params
    namespace: default
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: configmap-gateway
  namespace: default
spec:
  gatewayClassName: agentgateway-tracing-configmap
  listeners:
  - allowedRoutes:
      namespaces:
        from: Same
    name: http
    port: 8080
    protocol: HTTP
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: Backend
metadata:
  name: static-backend
  namespace: default
spec:
  type: Static
  static:
    hosts:
    - host: httpbin.org
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tracing-configmap-test-route
  namespace: default
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: configmap-gateway
  rules:
  - name: static
    backendRefs:
    - group: gateway.kgateway.dev
      kind: Backend
      name: static-backend
    matches:
    - path:
        type: PathPrefix
        value: /