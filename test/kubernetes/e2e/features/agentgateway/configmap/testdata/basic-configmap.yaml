apiVersion: v1
kind: ConfigMap
metadata:
  name: basic-agent-gateway-config
  namespace: default
data:
  config.yaml: |-
    config:
      # Basic configuration for agentgateway
      debug: false
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayParameters
metadata:
  name: basic-configmap-gateway-params
  namespace: default
spec:
  kube:
    agentgateway:
      enabled: true
      logLevel: debug
      customConfigMapName: basic-agent-gateway-config
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: agentgateway-basic-configmap
spec:
  controllerName: kgateway.dev/agentgateway
  parametersRef:
    group: gateway.kgateway.dev
    kind: GatewayParameters
    name: basic-configmap-gateway-params
    namespace: default
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: configmap-gateway
  namespace: default
spec:
  gatewayClassName: agentgateway-basic-configmap
  listeners:
  - allowedRoutes:
      namespaces:
        from: Same
    name: http
    port: 8080
    protocol: HTTP
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: Backend
metadata:
  name: static-backend
  namespace: default
spec:
  type: Static
  static:
    hosts:
    - host: httpbin.org
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: basic-configmap-test-route
  namespace: default
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: configmap-gateway
  rules:
  - name: static
    backendRefs:
    - group: gateway.kgateway.dev
      kind: Backend
      name: static-backend
    matches:
    - path:
        type: PathPrefix
        value: /