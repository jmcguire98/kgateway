apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-fields-agent-gateway-config
  namespace: default
data:
  config.yaml: |-
    config:
      backends:
      - name: default/httpbin-backend
        static:
          host: httpbin.default.svc.cluster.local
          port: 8000
      binds:
      - key: 8080/default/configmap-gateway
        port: 8080
      listeners:
      - bindKey: 8080/default/configmap-gateway
        gatewayName: default/configmap-gateway
        key: default/configmap-gateway.http
        name: http
        protocol: HTTP
      routes:
      - backends:
        - backend:
            backend: default/httpbin-backend
          weight: 1
        key: default/configmap-test-route.0.0.http
        listenerKey: default/configmap-gateway.http
        routeName: default/configmap-test-route
      tracing:
        otlpEndpoint: http://localhost:4317
        otlpProtocol: grpc
        randomSampling: true
        fields:
          add:
            gen_ai.operation.name: '"http"'
            gen_ai.system: '"kgateway"'
            user.id: "request.headers['x-user-id'] || 'anonymous'"
            request.path: "request.path"
            custom.field.example: '"test-value"'
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayParameters
metadata:
  name: custom-fields-configmap-gateway-params
  namespace: default
spec:
  kube:
    agentgateway:
      enabled: true
      logLevel: debug
      customConfigMapName: custom-fields-agent-gateway-config
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: agentgateway-custom-fields-configmap
spec:
  controllerName: kgateway.dev/agentgateway
  parametersRef:
    group: gateway.kgateway.dev
    kind: GatewayParameters
    name: custom-fields-configmap-gateway-params
    namespace: default
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: configmap-gateway
  namespace: default
spec:
  gatewayClassName: agentgateway-custom-fields-configmap
  listeners:
  - allowedRoutes:
      namespaces:
        from: Same
    name: http
    port: 8080
    protocol: HTTP
